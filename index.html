    <!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Samandarov_bot</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a0a1a 0%, #0d1b3e 50%, #0a0a1a 100%);
      font-family: 'DM Sans', sans-serif;
    }

    .bot-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 28px;
      letter-spacing: 2px;
      color: #fff;
      text-transform: uppercase;
      margin-bottom: 1.8rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .bot-title span {
      background: linear-gradient(90deg, #00c6ff, #00ffa3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #00ffa3;
      box-shadow: 0 0 8px #00ffa3;
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .box {
      background: rgba(255,255,255,0.04);
      border: 0.5px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 2rem 2.2rem;
      width: 100%;
      max-width: 400px;
      backdrop-filter: blur(12px);
    }

    .form-group { margin-bottom: 1.1rem; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 6px;
    }

    .name, .email, .textarea {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 0.5px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 11px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: #fff;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .name::placeholder, .email::placeholder, .textarea::placeholder {
      color: rgba(255,255,255,0.25);
    }
    .name:focus, .email:focus, .textarea:focus {
      border-color: rgba(0,198,255,0.6);
      background: rgba(0,198,255,0.06);
      box-shadow: 0 0 0 3px rgba(0,198,255,0.1);
    }
    .textarea {
      resize: vertical;
      min-height: 90px;
      line-height: 1.6;
    }

    .submit {
      width: 100%;
      margin-top: 0.4rem;
      padding: 13px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #00c6ff 0%, #00ffa3 100%);
      color: #03111e;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .submit:hover { opacity: 0.88; }
    .submit:active { transform: scale(0.98); }
  </style>
</head>
<body>

  <div class="bot-title">
    <div class="dot"></div>
    <span>Samandarov</span>_bot
  </div>

  <div class="box">
    <form class="form" action="">
      <div class="form-group">
        <label>Ism</label>
        <input class="name" type="text" placeholder="Ismingizni kiriting" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input class="email" type="email" placeholder="example@gmail.com" />
      </div>
      <div class="form-group">
        <label>Xabar</label>
        <textarea class="textarea" placeholder="Xabaringizni yozing..."></textarea>
      </div>
      <button class="submit" type="submit">Yuborish →</button>
    </form>
  </div>

</body>
</html>
        
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        
        <script src="./app.js"></script>
</body>
</html>
